name: Lint

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

jobs:
  flake8:
    name: Flake8
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '#without[lint]') &&
      !contains(github.event.head_commit.message || '', '#without[all]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Flake8
        run: pip install flake8 flake8-bugbear

      - name: Run Flake8
        run: flake8 src/

  mypy:
    name: MyPy
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '#without[lint]') &&
      !contains(github.event.head_commit.message || '', '#without[all]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install MyPy
        run: pip install mypy

      - name: Run MyPy
        run: mypy src/

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '#without[lint]') &&
      !contains(github.event.head_commit.message || '', '#without[all]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint
        run: ruff check src/

      - name: Run Ruff Format Check
        run: ruff format --check src/
