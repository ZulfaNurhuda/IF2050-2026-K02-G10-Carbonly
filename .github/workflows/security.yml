name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '#without[security]') &&
      !contains(github.event.head_commit.message || '', '#without[all]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r src/ -c pyproject.toml

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '#without[security]') &&
      !contains(github.event.head_commit.message || '', '#without[all]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Pip Audit
        run: pip install pip-audit

      - name: Run Pip Audit
        run: pip-audit -r requirements.txt
